# Authoritative deployment definition for the OAI + OVS + ONOS N6 slicing testbed.
# Use it explicitly with:
#   docker compose -f docker-compose.yaml --env-file .env ...
# Developer-only overrides live under ./overrides/ and are opt-in only.
services:
    mysql:
        container_name: "rfsim5g-mysql"
        image: mysql:8.0
        init: true
        volumes:
            - ./oai_db.sql:/docker-entrypoint-initdb.d/oai_db.sql
            - ./mysql-healthcheck.sh:/tmp/mysql-healthcheck.sh
        environment:
            - TZ=Europe/Paris
            - MYSQL_DATABASE=oai_db
            - MYSQL_USER=test
            - MYSQL_PASSWORD=test
            - MYSQL_ROOT_PASSWORD=linux
        healthcheck:
            test: ["CMD", "/tmp/mysql-healthcheck.sh"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            public_net:
                ipv4_address: 192.168.71.131
    oai-amf:
        container_name: "rfsim5g-oai-amf"
        image: oaisoftwarealliance/oai-amf:v2.1.9
        environment:
            - TZ=Europe/Paris
        volumes:
            - ./mini_nonrf_config.yaml:/openair-amf/etc/config.yaml
        depends_on:
            - mysql
        networks:
            public_net:
                ipv4_address: 192.168.71.132
    oai-smf:
        container_name: "rfsim5g-oai-smf"
        image: oaisoftwarealliance/oai-smf:v2.1.9
        environment:
            - TZ=Europe/Paris
        volumes:
            - ./mini_nonrf_config.yaml:/openair-smf/etc/config.yaml
        depends_on:
            - oai-amf
        networks:
            public_net:
                ipv4_address: 192.168.71.133
    oai-upf:
        container_name: "rfsim5g-oai-upf"
        image: oaisoftwarealliance/oai-upf:v2.1.9
        init: true
        environment:
            - TZ=Europe/Paris
            - UPF_N6_IF=${UPF_N6_IF:-n6ovs0}
            - UPF_WAIT_TIMEOUT_SECONDS=${UPF_WAIT_TIMEOUT_SECONDS:-120}
            - UPF_CONFIG_PATH=/openair-upf/etc/config.yaml
        volumes:
            - ./mini_nonrf_config.yaml:/openair-upf/etc/config.yaml
            - ./upf-entrypoint.sh:/upf-entrypoint.sh:ro
        depends_on:
            - oai-smf
        cap_add:
            - NET_ADMIN
            - SYS_ADMIN
        cap_drop:
            - ALL
        privileged: true
        networks:
            public_net:
                ipv4_address: 192.168.71.134
                interface_name: eth0
        entrypoint: ["/bin/bash", "/upf-entrypoint.sh"]

    # ext-DN stays on public_net only; OVS injects the N6-side interface as dn0.
    oai-ext-dn:
        privileged: true
        container_name: rfsim5g-oai-ext-dn
        image: oaisoftwarealliance/trf-gen-cn5g:focal
        init: true
        environment:
            - PUBLIC_IF=eth0
            - EXT_DN_IF=${EXT_DN_IF:-dn0}
            - UPF_N6_GW=${UPF_N6_GW:-192.168.72.134}
            - EXT_DN_WAIT_TIMEOUT_SECONDS=${EXT_DN_WAIT_TIMEOUT_SECONDS:-120}
            - EXT_DN_WAIT_LOG_INTERVAL_SECONDS=${EXT_DN_WAIT_LOG_INTERVAL_SECONDS:-5}
            - EXT_DN_ROUTE_LIST=${EXT_DN_ROUTE_LIST:-12.1.1.0/24,12.1.2.0/24,12.1.3.0/24}
            - EXT_DN_STARTUP_PROBE_ENABLED=${EXT_DN_STARTUP_PROBE_ENABLED:-true}
            - EXT_DN_STARTUP_PROBE_TARGET=${EXT_DN_STARTUP_PROBE_TARGET:-192.168.72.134}
            - EXT_DN_STARTUP_PROBE_COUNT=${EXT_DN_STARTUP_PROBE_COUNT:-1}
            - EXT_DN_STARTUP_PROBE_TIMEOUT_SECONDS=${EXT_DN_STARTUP_PROBE_TIMEOUT_SECONDS:-1}
        entrypoint: ["/bin/bash", "/ext-dn-entrypoint.sh"]
        depends_on:
            - oai-upf
        volumes:
            - ./ext-dn-entrypoint.sh:/ext-dn-entrypoint.sh:ro
            - ./ext-dn-healthcheck.sh:/ext-dn-healthcheck.sh:ro
        networks:
            public_net:
                ipv4_address: 192.168.71.135
        healthcheck:
            test: ["CMD", "/ext-dn-healthcheck.sh"]
            start_period: 150s
            start_interval: 1s
            interval: 10s
            timeout: 5s
            retries: 12
    oai-gnb:
        image: ${REGISTRY:-oaisoftwarealliance}/${GNB_IMG:-oai-gnb}:${TAG:-develop}
        container_name: rfsim5g-oai-gnb
        cap_add:
            - SYS_NICE
        cap_drop:
            - ALL
        environment:
            USE_ADDITIONAL_OPTIONS: -E --rfsim --log_config.global_log_options level,nocolor,time
            ASAN_OPTIONS: detect_leaks=0
        depends_on:
            oai-ext-dn:
                condition: service_started
        networks:
            public_net:
                ipv4_address: 192.168.71.140
        volumes:
            - ../../conf_files/gnb.sa.band78.106prb.rfsim.yaml:/opt/oai-gnb/etc/gnb.yaml
        healthcheck:
            test: /bin/bash -c "pgrep nr-softmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5
    oai-nr-ue:
        image: ${REGISTRY:-oaisoftwarealliance}/${NRUE_IMG:-oai-nr-ue}:${TAG:-develop}
        container_name: rfsim5g-oai-nr-ue
        cap_drop:
            - ALL
        cap_add:
            - NET_ADMIN  # for interface bringup
            - NET_RAW    # for ping
            - SYS_NICE
        environment:
            USE_ADDITIONAL_OPTIONS: -E --rfsim -r 106 --numerology 1 --uicc0.imsi 208990100001100 -C 3319680000 --rfsimulator.serveraddr 192.168.71.140 --log_config.global_log_options level,nocolor,time
        depends_on:
            - oai-gnb
        networks:
            public_net:
                ipv4_address: 192.168.71.150
        dns:
            - 8.8.8.8
            - 1.1.1.1        
        devices:
             - /dev/net/tun:/dev/net/tun
        volumes:
            - ../../conf_files/nrue.uicc.yaml:/opt/oai-nr-ue/etc/nr-ue.yaml
        healthcheck:
            test: /bin/bash -c "pgrep nr-uesoftmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5
