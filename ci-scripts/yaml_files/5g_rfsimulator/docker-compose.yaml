    # Canonical ONOS controller and REST endpoint for the authoritative testbed.
    onos:
        container_name: onos
        image: onosproject/onos
        restart: always
        ports:
            - "${ONOS_REST_PORT:-8181}:8181"   # Web GUI & REST API
            - "8101:8101"   # CLI over SSH
            - "${ONOS_OF_PORT:-6653}:6653"   # OpenFlow (new)
            - "6633:6633"   # OpenFlow (legacy)
        environment:
            - ONOS_APPS=gui2,openflow
        networks:
            public_net:
                ipv4_address: ${ONOS_HOST:-192.168.71.160}
    # OVS reconciles br-n6 plus dn0/n6ovs0 and connects to ONOS over OpenFlow 1.3.
    ovs:
        build: ./ovs
        image: custom-ovs:noble
        container_name: ovs
        privileged: true
        pid: host
        restart: unless-stopped
        depends_on:
           - oai-upf
           - oai-ext-dn
           - onos
        environment:
          UPF_CONT: "${UPF_CONTAINER_NAME:-rfsim5g-oai-upf}"
          EDN_CONT: "${EXT_DN_CONTAINER_NAME:-rfsim5g-oai-ext-dn}"
          UPF_N6_IF: "${UPF_N6_IF:-n6ovs0}"
          EDN_IF: "${EXT_DN_IF:-dn0}"
          UPF_N6_IP: "${UPF_N6_IP:-192.168.72.134/26}"
          EDN_IP: "${EXT_DN_N6_IP:-192.168.72.135/26}"
          BR: "${OVS_BRIDGE_NAME:-br-n6}"
          V_UPF_HOST: "${OVS_UPF_PORT_NAME:-v-upf-host}"
          V_EDN_HOST: "${OVS_EDN_PORT_NAME:-v-edn-host}"
          ONOS_CTRL: "${ONOS_CTRL:-192.168.71.160:6653}"
          ONOS_BASE_URL: "${ONOS_BASE_URL:-http://192.168.71.160:8181}"
          ONOS_AUTH: "${ONOS_AUTH:-onos:rocks}"
          OVS_HOST: "${OVS_HOST:-192.168.71.161}"
          ONOS_CTRL_TIMEOUT_SECONDS: "${ONOS_CTRL_TIMEOUT_SECONDS:-30}"
          OVS_RECONCILE_INTERVAL_SECONDS: "${OVS_RECONCILE_INTERVAL_SECONDS:-5}"
          N6_ARP_FORWARD_PRIORITY: "${N6_ARP_FORWARD_PRIORITY:-45000}"
          N6_BASE_FORWARD_PRIORITY: "${N6_BASE_FORWARD_PRIORITY:-5000}"
        volumes:
            - ./ovs-init.sh:/ovs-init.sh:ro
            - ./ovs-start.sh:/ovs-start.sh:ro
            - ./onos-bootstrap-forwarding.py:/onos-bootstrap-forwarding.py:ro
            - ./ovs-healthcheck.sh:/ovs-healthcheck.sh:ro
            - /var/run/docker.sock:/var/run/docker.sock
        command: ["/bin/bash", "/ovs-start.sh"]
        networks:
            public_net:
                ipv4_address: ${OVS_HOST:-192.168.71.161}
        healthcheck:
            test: ["CMD", "/ovs-healthcheck.sh"]
            start_period: 90s
            start_interval: 1s
            interval: 10s
            timeout: 5s
            retries: 12

    # Optional observability profile for local lab monitoring.
    prometheus:
        container_name: prometheus
        image: prom/prometheus
        restart: unless-stopped
        profiles: ["monitoring"]
        command:
            - --config.file=/etc/prometheus/prometheus.yml
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "9090:9090"
        volumes:
            - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        networks:
            public_net:

    # Grafana persists dashboards and data sources across restarts.
    grafana:
        container_name: grafana
        image: grafana/grafana
        restart: unless-stopped
        profiles: ["monitoring"]
        ports:
            - "3000:3000"
        volumes:
            - grafana-storage:/var/lib/grafana
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
        networks:
            public_net:

networks:
    public_net:
        driver: bridge
        name: rfsim5g-oai-public-net
        ipam:
            config:
                - subnet: 192.168.71.128/26
        driver_opts:
            com.docker.network.bridge.name: "rfsim5g-public"

volumes:
    grafana-storage:
