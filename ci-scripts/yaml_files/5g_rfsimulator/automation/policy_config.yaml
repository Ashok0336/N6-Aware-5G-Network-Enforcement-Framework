{
  "service_mapping_path": "./service_mapping.yaml",
  "polling_interval_seconds": 2,
  "metrics_http_host": "0.0.0.0",
  "metrics_http_port": 8001,
  "telemetry_dir": "../logs/telemetry",
  "telemetry_glob": "telemetry_*.jsonl",
  "log_dir": "../logs/policy",
  "decision_cooldown_seconds": 10,
  "emit_unchanged_decisions": true,
  "unchanged_decision_log_interval_seconds": 30,
  "default_policy_action": "MAINTAIN_CURRENT_POLICY",
  "restore_policy_action": "RESTORE_DEFAULT_POLICY",
  "service_classes": {
    "real_time_control": {
      "policy_name": "real_time_control_guard",
      "trigger_action_name": "INCREASE_CONTROL_PRIORITY",
      "traffic_udp_port": 5202,
      "ue_container_names": [
        "rfsim5g-oai-nr-ue",
        "rfsim5g-oai-nr-ue2"
      ],
      "ping_log_names": [
        "control_ue1.log",
        "control_ue2.log"
      ],
      "udp_sender_log_names": [
        "control_ue1_udp.log",
        "control_ue2_udp.log"
      ],
      "ping_log_keywords": [
        "control"
      ],
      "iperf_log_keywords": [
        "control"
      ],
      "latency_avg_threshold_ms": 20.0,
      "latency_max_threshold_ms": 35.0,
      "packet_loss_threshold_percent": 1.0
    },
    "high_throughput_data": {
      "policy_name": "high_throughput_guard",
      "trigger_action_name": "TIGHTEN_DATA_SHAPING",
      "traffic_udp_port": 5201,
      "ue_container_names": [
        "rfsim5g-oai-nr-ue3",
        "rfsim5g-oai-nr-ue4",
        "rfsim5g-oai-nr-ue5",
        "rfsim5g-oai-nr-ue6"
      ],
      "udp_sender_log_names": [
        "data_ue3.log",
        "data_ue4.log",
        "data_ue5.log",
        "data_ue6.log"
      ],
      "iperf_log_keywords": [
        "data"
      ],
      "monitored_queue_ids": [
        "1"
      ],
      "throughput_threshold_bps": 85000000,
      "queue_occupancy_threshold_bytes_per_second": 10500000,
      "queue_packets_threshold_per_second": 9000.0
    },
    "sensor_telemetry": {
      "policy_name": "sensor_telemetry_guard",
      "trigger_action_name": "PROTECT_SENSOR_MIN_BW",
      "traffic_udp_port": 5203,
      "ue_container_names": [
        "rfsim5g-oai-nr-ue7",
        "rfsim5g-oai-nr-ue8",
        "rfsim5g-oai-nr-ue9",
        "rfsim5g-oai-nr-ue10"
      ],
      "udp_sender_log_names": [
        "sensor_ue7.log",
        "sensor_ue8.log",
        "sensor_ue9.log",
        "sensor_ue10.log"
      ],
      "iperf_log_keywords": [
        "sensor"
      ],
      "monitored_interface_names": [
        "v-edn-host"
      ],
      "loss_threshold_percent": 2.0,
      "delivery_ratio_threshold_percent": 98.0,
      "drop_rate_threshold_percent": 0.5
    }
  },
  "enforcement": {
    "policy_log_dir": "../logs/policy",
    "policy_log_glob": "policy_decisions_*.jsonl",
    "log_dir": "../logs/enforcement",
    "polling_interval_seconds": 2,
    "cooldown_seconds": 10,
    "dry_run": true,
    "bootstrap_from_existing_policy_logs": true,
    "ensure_onos_slice_flows": true,
    "force_onos_flow_refresh": false,
    "read_current_ovs_profile_on_startup": true,
    "onos": {
      "base_url": "http://192.168.71.160:8181",
      "devices_path": "/onos/v1/devices",
      "username": "onos",
      "password": "rocks",
      "timeout_seconds": 5,
      "upf_port_name": "v-upf-host",
      "edn_port_name": "v-edn-host",
      "slice_flow_rules": [
        {
          "name": "embb",
          "udp_port": 5201,
          "queue_id": 1,
          "priority": 40000
        },
        {
          "name": "urllc",
          "udp_port": 5202,
          "queue_id": 2,
          "priority": 50000
        },
        {
          "name": "mmtc",
          "udp_port": 5203,
          "queue_id": 3,
          "priority": 30000
        }
      ],
      "base_forward_flow_priority": 5000,
      "reverse_flow_priority": 20000,
      "arp_flow_priority": 45000
    },
    "ovs": {
      "container_name": "ovs",
      "bridge_name": "br-n6",
      "egress_port_name": "v-edn-host"
    },
    "queue_profiles": {
      "baseline": {
        "parent_max_rate_bps": 120000000,
        "queues": {
          "1": {
            "min_rate_bps": 50000000,
            "max_rate_bps": 100000000
          },
          "2": {
            "min_rate_bps": 10000000,
            "max_rate_bps": 20000000
          },
          "3": {
            "min_rate_bps": 1000000,
            "max_rate_bps": 5000000
          }
        }
      },
      "action_overlays": {
        "INCREASE_CONTROL_PRIORITY": {
          "queues": {
            "2": {
              "min_rate_bps": 20000000,
              "max_rate_bps": 40000000
            }
          }
        },
        "TIGHTEN_DATA_SHAPING": {
          "queues": {
            "1": {
              "min_rate_bps": 30000000,
              "max_rate_bps": 60000000
            }
          }
        },
        "PROTECT_SENSOR_MIN_BW": {
          "queues": {
            "3": {
              "min_rate_bps": 5000000,
              "max_rate_bps": 10000000
            }
          }
        }
      }
    }
  }
}
